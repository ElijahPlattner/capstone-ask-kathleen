<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ask Kathleen</title>
    <style>
      :root {
        --bg: #f6f6f8;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: rgba(15, 23, 42, 0.12);
        --shadow-sm: 0 6px 18px rgba(2, 6, 23, 0.06);
        --brand: #d93a2f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      button,
      input {
        font: inherit;
      }

      .app-shell {
        min-height: 100vh;
        display: flex;
        align-items: stretch;
      }

      .left-sidebar {
        width: 220px;
        flex: 0 0 220px;
        color: #fff;
        background: linear-gradient(180deg, #4a38a6 0%, #2a136b 100%);
        padding: 24px 16px;
      }

      .side-label {
        margin: 0 0 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.9;
      }

      .quick-search {
        margin-top: 30px;
        padding-top: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }

      .quick-btn {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 10px;
        text-align: left;
        cursor: pointer;
      }

      .quick-btn:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .content-shell {
        flex: 1;
        min-width: 0;
      }

      .container {
        max-width: 1060px;
        margin: 0 auto;
        padding: 36px 20px 64px;
      }

      .hero-card {
        background: var(--card);
        border: 1px solid rgba(2, 6, 23, 0.06);
        border-radius: 28px;
        box-shadow: var(--shadow-sm);
        padding: 44px 26px;
      }

      .hero {
        text-align: center;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(34px, 4.2vw, 52px);
        letter-spacing: -0.03em;
        font-weight: 650;
      }

      .hero .ask {
        color: var(--brand);
      }

      .hero p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .search-wrap {
        max-width: 780px;
        margin: 28px auto 0;
      }

      .search-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .search-input {
        flex: 1 1 360px;
        position: relative;
      }

      .search-input input {
        width: 100%;
        height: 48px;
        border-radius: 18px;
        border: 1px solid var(--border);
        padding: 0 14px 0 44px;
        outline: none;
        background: #fff;
        box-shadow: var(--shadow-sm);
        font-size: 15px;
      }

      .search-input input:focus {
        border-color: rgba(15, 23, 42, 0.22);
        box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05), var(--shadow-sm);
      }

      .icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        opacity: 0.55;
      }

      .btn {
        height: 48px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: #fff;
        padding: 0 14px;
        font-weight: 600;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        box-shadow: var(--shadow-sm);
        cursor: pointer;
      }

      .btn:hover {
        background: #f8fafc;
      }

      .btn.primary {
        background: var(--brand);
        color: #fff;
        border-color: transparent;
      }

      .btn .mini {
        width: 16px;
        height: 16px;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      .actions .btn {
        height: auto;
        padding: 10px 18px;
      }

      .searching {
        text-align: center;
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .results {
        max-width: 780px;
        margin: 28px auto 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .empty-state {
        text-align: center;
        color: var(--muted);
        font-size: 14px;
        padding-top: 12px;
      }

      .result {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow-sm);
        padding: 18px;
      }

      .result h3 {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.015em;
      }

      .meta {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
      }

      .meta strong {
        color: #475569;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(2, 6, 23, 0.08);
        background: #fff;
        font-weight: 650;
      }

      .pill .dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        opacity: 1;
      }

      .pill.green {
        background: rgba(16, 185, 129, 0.1);
        border-color: rgba(16, 185, 129, 0.22);
        color: #047857;
      }

      .pill.green .dot {
        background: #10b981;
      }

      .pill.amber {
        background: rgba(245, 158, 11, 0.12);
        border-color: rgba(245, 158, 11, 0.22);
        color: #b45309;
      }

      .pill.amber .dot {
        background: #f59e0b;
      }

      .result-footer {
        margin-top: 14px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        flex-wrap: wrap;
      }

      .footer-left {
        flex: 1;
        min-width: 240px;
      }

      .footer-left pre {
        margin: 0;
        font: inherit;
        white-space: pre-wrap;
      }

      .vote {
        display: flex;
        gap: 10px;
      }

      .counter {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #fff;
        box-shadow: var(--shadow-sm);
        color: #334155;
        font-size: 14px;
        font-weight: 650;
        cursor: pointer;
      }

      .counter svg {
        width: 16px;
        height: 16px;
        opacity: 0.9;
      }

      .counter.counter--up.is-active {
        background: rgba(16, 185, 129, 0.12);
        border-color: rgba(16, 185, 129, 0.4);
        color: #047857;
      }

      .counter.counter--down.is-active {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.38);
        color: #b91c1c;
      }

      @media (max-width: 720px) {
        .app-shell {
          display: block;
        }

        .left-sidebar {
          width: 100%;
          padding: 22px 18px;
        }

        .hero-card {
          padding: 34px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="left-sidebar">
        <section class="quick-search">
          <p class="side-label">Quick Search</p>
          <button class="quick-btn" type="button">CRM migration</button>
          <button class="quick-btn" type="button">Resource expansion</button>
          <button class="quick-btn" type="button">Knowledge search</button>
          <button class="quick-btn" type="button">Internal repos</button>
        </section>
      </aside>

      <div class="content-shell">
        <main class="container">
          <section class="hero-card">
            <div class="hero">
              <h1><span class="ask">Ask</span> Kathleen</h1>
              <p>Search across project documents, summaries, and internal knowledge.</p>
            </div>

            <div class="search-wrap">
              <div class="search-row">
                <div class="search-input">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M21 21l-4.3-4.3"></path>
                  </svg>
                  <input id="queryInput" value="What are best practices for rapid growth projects?" aria-label="Search" />
                </div>

                <button class="btn primary" id="searchButton" type="button">
                  Search Now
                  <svg class="mini" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M9 18l6-6-6-6"></path>
                  </svg>
                </button>

                <button class="btn" id="uploadButton" type="button">
                  <svg class="mini" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="color: var(--brand)">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <path d="M7 10l5-5 5 5"></path>
                    <path d="M12 5v14"></path>
                  </svg>
                  Upload documents
                </button>
                <input id="fileInput" type="file" hidden />
              </div>

              <div class="actions">
                <button class="btn primary" id="searchKnowledgeButton" type="button">Search knowledge</button>
                <button class="btn" id="resetButton" type="button">Reset chat</button>
              </div>

              <div class="searching" id="statusText">
                Searching: SharePoint - Confluence - Teams Files - Internal Repos
              </div>
            </div>

            <section class="results" id="results" aria-label="Search results">
              <div class="empty-state">Ask a question to start a Flask-backed RAG conversation.</div>
            </section>
          </section>
        </main>
      </div>
    </div>

    <script>
      const queryInput = document.getElementById("queryInput");
      const searchButton = document.getElementById("searchButton");
      const searchKnowledgeButton = document.getElementById("searchKnowledgeButton");
      const resetButton = document.getElementById("resetButton");
      const uploadButton = document.getElementById("uploadButton");
      const fileInput = document.getElementById("fileInput");
      const resultsEl = document.getElementById("results");
      const statusText = document.getElementById("statusText");

      function updateCount(button, delta) {
        const countEl = button.querySelector(".vote-count");
        const current = Number(countEl?.textContent || "0");
        if (countEl) countEl.textContent = String(current + delta);
      }

      function wireVotes(scope = document) {
        scope.querySelectorAll(".vote").forEach((group) => {
          const upBtn = group.querySelector(".counter--up");
          const downBtn = group.querySelector(".counter--down");
          if (!upBtn || !downBtn || group.dataset.bound === "true") return;
          group.dataset.bound = "true";

          upBtn.addEventListener("click", () => {
            if (upBtn.classList.contains("is-active")) return;

            if (downBtn.classList.contains("is-active")) {
              updateCount(downBtn, -1);
              downBtn.classList.remove("is-active");
              downBtn.setAttribute("aria-pressed", "false");
            }

            updateCount(upBtn, 1);
            upBtn.classList.add("is-active");
            upBtn.setAttribute("aria-pressed", "true");
          });

          downBtn.addEventListener("click", () => {
            if (downBtn.classList.contains("is-active")) return;

            if (upBtn.classList.contains("is-active")) {
              updateCount(upBtn, -1);
              upBtn.classList.remove("is-active");
              upBtn.setAttribute("aria-pressed", "false");
            }

            updateCount(downBtn, 1);
            downBtn.classList.add("is-active");
            downBtn.setAttribute("aria-pressed", "true");
          });
        });
      }

      function setStatus(message) {
        statusText.textContent = message;
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function renderHistory(history) {
        const visible = history.filter((item) => item.role !== "system");
        if (!visible.length) {
          resultsEl.innerHTML = '<div class="empty-state">Ask a question to start a Flask-backed RAG conversation.</div>';
          return;
        }

        resultsEl.innerHTML = visible
          .map((item) => {
            const title = item.role === "user" ? "You asked" : "Kathleen answered";
            const source = item.role === "user" ? "Prompt" : "Flask + Ollama + Supabase";
            const statusClass = item.role === "user" ? "amber" : "green";
            const statusLabel = item.role === "user" ? "User message" : "Generated response";

            return `
              <article class="result">
                <h3>${title}</h3>
                <div class="meta">
                  <span><strong>${source}</strong> - Current session</span>
                  <span>Status:</span>
                  <span class="pill ${statusClass}"><span class="dot"></span>${statusLabel}</span>
                </div>
                <div class="result-footer">
                  <div class="footer-left">
                    <pre>${escapeHtml(item.content)}</pre>
                  </div>
                  <div class="vote">
                    <button class="counter counter--up" type="button" aria-pressed="false">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11a2 2 0 0 0 2-2l1-7a2 2 0 0 0-2-2h-5z"></path>
                      </svg>
                      <span class="vote-count">0</span>
                    </button>
                    <button class="counter counter--down" type="button" aria-pressed="false">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H6a2 2 0 0 0-2 2l-1 7a2 2 0 0 0 2 2h5z"></path>
                      </svg>
                      <span class="vote-count">0</span>
                    </button>
                  </div>
                </div>
              </article>
            `;
          })
          .join("");

        wireVotes(resultsEl);
      }

      function renderLoadingState() {
        resultsEl.innerHTML = '<div class="empty-state">Consulting Ollama and Supabase...</div>';
      }

      async function loadHistory() {
        const response = await fetch("/api/chat/history");
        const payload = await response.json();
        renderHistory(payload.history || []);
      }

      async function submitQuery() {
        const query = queryInput.value.trim();
        if (!query) return;

        setStatus("");
        renderLoadingState();
        searchButton.disabled = true;
        searchKnowledgeButton.disabled = true;

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query }),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || "Request failed.");
          }
          renderHistory(payload.history || []);
          setStatus("Search complete.");
        } catch (error) {
          setStatus(`Request failed: ${error.message}`);
        } finally {
          searchButton.disabled = false;
          searchKnowledgeButton.disabled = false;
        }
      }

      async function resetChat() {
        await fetch("/api/chat/reset", { method: "POST" });
        renderHistory([]);
        setStatus("Chat history cleared.");
      }

      async function uploadFile(file) {
        const formData = new FormData();
        formData.append("file", file);
        setStatus(`Uploading ${file.name}...`);

        const response = await fetch("/api/upload", {
          method: "POST",
          body: formData,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Upload failed.");
        }
        setStatus(`Uploaded ${payload.doc.title}.`);
      }

      document.querySelectorAll(".quick-btn").forEach((button) => {
        button.addEventListener("click", () => {
          queryInput.value = button.textContent.trim();
          submitQuery();
        });
      });

      searchButton.addEventListener("click", submitQuery);
      searchKnowledgeButton.addEventListener("click", submitQuery);
      queryInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          submitQuery();
        }
      });
      resetButton.addEventListener("click", resetChat);
      uploadButton.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", async () => {
        const [file] = fileInput.files;
        if (!file) return;
        try {
          await uploadFile(file);
        } catch (error) {
          setStatus(`Upload failed: ${error.message}`);
        } finally {
          fileInput.value = "";
        }
      });

      wireVotes();
      loadHistory();
    </script>
  </body>
</html>
