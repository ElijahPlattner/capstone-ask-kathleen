<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ask Kathleen — Doc Discovery + Local DB</title>
    <style>
      :root{
        --bg:#f6f6f8;
        --card:#ffffff;
        --text:#0f172a;
        --muted:#64748b;
        --border:rgba(15,23,42,.12);
        --shadow: 0 10px 30px rgba(2,6,23,.08);
        --shadow-sm: 0 6px 18px rgba(2,6,23,.06);
        --brand:#d93a2f;
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 14px;
      }

      *{box-sizing:border-box}
      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
        color:var(--text);
        background:var(--bg);
      }
      a{color:inherit; text-decoration:none}
      button,input,select{font:inherit}

      .app-shell{
        min-height:100vh;
        display:flex;
        align-items:stretch;
      }
      .left-sidebar{
        width:220px;
        flex:0 0 220px;
        color:#fff;
        background: linear-gradient(180deg, #4a38a6 0%, #2a136b 100%);
        padding: 24px 16px;
      }
      .side-label{
        margin:0 0 10px;
        font-size:12px;
        font-weight:700;
        letter-spacing:.08em;
        text-transform:uppercase;
        opacity:.9;
      }
      .quick-btn{
        width:100%;
        border:1px solid rgba(255,255,255,.22);
        background: rgba(255,255,255,.08);
        color:#fff;
        border-radius:8px;
        padding:10px 12px;
        margin-bottom:10px;
        text-align:left;
        cursor:pointer;
      }
      .quick-btn:hover{background:rgba(255,255,255,.15)}
      .content-shell{
        flex:1;
        min-width:0;
      }

      .container{
        max-width: 1060px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* Main card */
      main{padding: 36px 0 64px}
      .hero-card{
        background: var(--card);
        border: 1px solid rgba(2,6,23,.06);
        border-radius: 28px;
        box-shadow: var(--shadow-sm);
        padding: 44px 26px;
      }
      .hero{
        text-align:center;
      }
      .hero h1{
        margin:0;
        font-size: clamp(34px, 4.2vw, 52px);
        letter-spacing: -0.03em;
        font-weight: 650;
      }
      .hero .ask{color:var(--brand)}
      .hero p{
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      /* Search row */
      .search-wrap{
        max-width: 780px;
        margin: 28px auto 0;
      }
      .search-row{
        display:flex;
        gap:10px;
        align-items:center;
        flex-wrap: wrap;
      }
      .search-input{
        flex: 1 1 360px;
        position:relative;
      }
      .search-input input{
        width:100%;
        height:48px;
        border-radius: 18px;
        border: 1px solid var(--border);
        padding: 0 14px 0 44px;
        outline:none;
        background:#fff;
        box-shadow: var(--shadow-sm);
        font-size: 15px;
      }
      .search-input input:focus{
        border-color: rgba(15,23,42,.22);
        box-shadow: 0 0 0 4px rgba(15,23,42,.05), var(--shadow-sm);
      }
      .icon{
        position:absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width:18px;height:18px;
        opacity:.55;
      }
      .btn{
        height:48px;
        border-radius:18px;
        border: 1px solid var(--border);
        background:#fff;
        padding: 0 14px;
        font-weight: 600;
        font-size: 14px;
        display:inline-flex;
        align-items:center;
        gap:10px;
        box-shadow: var(--shadow-sm);
        cursor:pointer;
      }
      .btn:hover{background:#f8fafc}
      .btn.primary{
        background: var(--brand);
        color:#fff;
        border-color: rgba(0,0,0,0);
      }
      .btn.primary:hover{filter: brightness(.97)}
      .btn .mini{width:16px; height:16px}

      /* Filters */
      .filters-menu{
        position:relative;
      }
      .filters-menu summary{
        list-style:none;
      }
      .filters-menu summary::-webkit-details-marker{
        display:none;
      }
      .filters-panel{
        position:absolute;
        top: calc(100% + 10px);
        right:0;
        width: min(92vw, 380px);
        background:#fff;
        border:1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding:14px;
        z-index:20;
        text-align:left;
      }
      .filter-field{
        display:flex;
        flex-direction:column;
        gap:6px;
        margin-bottom:10px;
      }
      .filter-field label{
        font-size:12px;
        font-weight:650;
        color:#334155;
      }
      .filter-field input,
      .filter-field select{
        height:40px;
        border-radius:12px;
        border:1px solid var(--border);
        padding:0 10px;
        background:#fff;
        color:var(--text);
      }
      .filter-range{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
      }

      .searching{
        text-align:center;
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
      }
      .dot{opacity:.35; padding: 0 6px}

      /* Results */
      .results{
        max-width: 780px;
        margin: 28px auto 0;
        display:flex;
        flex-direction:column;
        gap:14px;
      }
      .result{
        background:#fff;
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow-sm);
        padding: 18px;
      }
      .result h3{
        margin:0;
        font-size: 18px;
        letter-spacing: -0.015em;
      }
      .result h3 .dim{color:var(--muted); font-weight: 550}
      .meta{
        margin-top: 8px;
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        align-items:center;
        color: var(--muted);
        font-size: 12px;
      }
      .meta strong{color:#475569}
      .pill{
        display:inline-flex;
        align-items:center;
        gap:8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(2,6,23,.08);
        background:#fff;
        font-weight: 650;
      }
      .pill .dot{
        width:7px;height:7px;border-radius:999px;
        background:#22c55e;
        opacity:1;
        padding:0;
      }
      .pill.green{
        background: rgba(16,185,129,.10);
        border-color: rgba(16,185,129,.22);
        color: #047857;
      }
      .pill.green .dot{background:#10b981}
      .pill.amber{
        background: rgba(245,158,11,.12);
        border-color: rgba(245,158,11,.22);
        color:#b45309;
      }
      .pill.amber .dot{background:#f59e0b}
      .pill.blue{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.18);color:#1e3a8a}
      .pill.gray{background:rgba(100,116,139,.06);border-color:rgba(100,116,139,.12);color:#334155}
      .pill.purple{background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.18);color:#6d28d9}

      .result-footer{
        margin-top: 14px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:12px;
        flex-wrap: wrap;
      }
      .footer-left{display:flex; gap:10px; flex-wrap:wrap}
      .vote{
        display:flex;
        gap:10px;
      }
      .counter{
        display:inline-flex;
        align-items:center;
        gap:8px;
        padding: 9px 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background:#fff;
        box-shadow: var(--shadow-sm);
        color:#334155;
        font-size: 14px;
        font-weight: 650;
        cursor:pointer;
      }
      .counter svg{width:16px;height:16px; opacity:.9}
      .counter.counter--up.is-active{
        background: rgba(16,185,129,.12);
        border-color: rgba(16,185,129,.4);
        color:#047857;
      }
      .counter.counter--down.is-active{
        background: rgba(239,68,68,.12);
        border-color: rgba(239,68,68,.38);
        color:#b91c1c;
      }

      /* modal */
      .pdf-modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(2,6,23,.55);z-index:1200;padding:24px}
      .pdf-modal.is-open{display:flex}.pdf-frame{width:min(1100px,96%);height:min(820px,92%);background:#fff;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
      .pdf-frame header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
      .pdf-frame iframe{width:100%;height:100%;border:0}
      .top-controls{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-bottom:12px}
      .db-controls{display:flex;gap:8px;align-items:center;margin-left:auto}

      @media (max-width: 720px){
        .app-shell{display:block}
        .left-sidebar{width:100%; padding: 22px 18px}
        .left-sidebar h2{font-size:34px}
        .side-copy{font-size:26px}
        .side-list li{font-size:24px}
        .hero-card{padding: 34px 18px}
        .pdf-frame{height:86vh;width:96%}
      }
    </style>
  </head>

  <body>
    <div class="app-shell">
      <aside class="left-sidebar">
        <p class="side-label" style="color:rgba(255,255,255,.9);margin-bottom:12px">Quick Search</p>
        <button class="quick-btn" type="button">CRM migration</button>
        <button class="quick-btn" type="button">Resource expansion</button>
        <button class="quick-btn" type="button">Knowledge search</button>
      </aside>

      <div class="content-shell">
        <main>
          <div class="container">
            <section class="hero-card">
              <div class="hero">
                <h1><span class="ask">Ask</span> Kathleen</h1>
                <p>Search across project documents, summaries, and internal knowledge.</p>
              </div>

              <div class="search-wrap">
                <div class="search-row">
                  <div class="search-input">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;opacity:.55">
                      <circle cx="11" cy="11" r="7"></circle>
                      <path d="M21 21l-4.3-4.3"></path>
                    </svg>
                    <input id="searchBox" value="What are best practices for rapid growth projects?" aria-label="Search" style="padding-left:44px;height:48px;width:100%;border-radius:18px;border:1px solid var(--border)"/>
                  </div>

                  <button class="btn primary" id="searchBtn">Search Now</button>

                  <!-- <div class="top-controls" style="margin-left:auto">
                    <div class="db-controls">
                      <button class="btn" id="exportDb">Export DB</button>
                      <label class="btn" for="importDbFile" style="cursor:pointer">Import DB<input id="importDbFile" type="file" accept="application/json" style="display:none"></label>
                      <button class="btn" id="resetDb">Reset DB</button>
                    </div>
                  </div> -->
                </div> 

                <div style="display:flex;justify-content:center;gap:12px;margin-top:14px">
                  <button class="btn primary" id="refreshDocs">Refresh discovery</button>

                  <!-- filters menu -->
                  <details class="filters-menu" style="position:relative">
                    <summary class="btn" style="height:40px;border-radius:12px;padding:8px 12px;display:inline-flex;align-items:center;gap:8px;">Advanced filters</summary>
                    <div class="filters-panel" role="region" aria-label="Advanced filters">
                      <div class="filter-field">
                        <label for="filter-location">Location</label>
                        <select id="filter-location">
                          <option value="">Any location</option>
                          <option value="Sharepoint">Sharepoint</option>
                          <option value="Teams">Teams</option>
                          <option value="Confluence">Confluence</option>
                        </select>
                      </div>

                      <div class="filter-range">
                        <div class="filter-field">
                          <label for="filter-start-date">Start date</label>
                          <input id="filter-start-date" type="date" />
                        </div>
                        <div class="filter-field">
                          <label for="filter-end-date">End date</label>
                          <input id="filter-end-date" type="date" />
                        </div>
                      </div>

                      <div class="filter-field">
                        <label for="filter-status">Status</label>
                        <select id="filter-status">
                          <option value="">Any status</option>
                          <option value="Approved">Approved</option>
                          <option value="Needs review">Needs review</option>
                        </select>
                      </div>

                      <div class="filter-field" style="margin-bottom:0;">
                        <label for="filter-sensitivity">Sensitivity</label>
                        <select id="filter-sensitivity">
                          <option value="">Any sensitivity</option>
                          <option value="Internal">Internal</option>
                          <option value="External">External</option>
                          <option value="External — Limited">External — Limited</option>
                        </select>
                      </div>
                    </div>
                  </details>
                </div>

                <div class="searching" style="text-align:center;margin-top:12px;color:var(--muted);font-size:12px">
                  Searching: <span>SharePoint</span><span class="dot">·</span><span>Confluence</span><span class="dot">·</span><span>Teams</span>
                </div>
              </div>

              <section class="results" aria-label="Search results">
                <!-- JS injects cards here -->
              </section>
            </section>
          </div>
        </main>
      </div>
    </div>

    <!-- PDF Modal -->
    <div id="pdfModal" class="pdf-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="pdfTitle">
      <div class="pdf-frame" role="document">
        <header>
          <div class="title" id="pdfTitle">Document</div>
          <div style="display:flex;gap:8px;align-items:center">
            <a id="openNewTab" class="btn" href="#" target="_blank" rel="noopener">Open in new tab</a>
            <button id="closePdf" class="btn">Close</button>
          </div>
        </header>
        <main id="pdfViewer" style="height:100%">
          <iframe id="pdfFrame" src="" title="PDF viewer"></iframe>
        </main>
      </div>
    </div>

    <!-- Edit Metadata Modal -->
    <div id="editMetaModal" class="modal" aria-hidden="true" style="display:none">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="editMetaTitle">
        <header style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h3 id="editMetaTitle" style="margin:0;font-size:18px">Edit metadata</h3>
          <button id="closeEditMeta" aria-label="Close metadata editor" class="btn" type="button">✕</button>
        </header>

        <form id="editMetaForm" style="display:flex;flex-direction:column;gap:10px">
          <input type="hidden" id="editDocId" />

          <div>
            <label style="display:block;font-weight:600;font-size:13px;margin-bottom:6px">Document</label>
            <div id="editDocTitle" style="font-size:14px;color:var(--text);"></div>
          </div>

          <div>
            <label for="editSensitivity" style="display:block;font-weight:600;font-size:13px;margin-bottom:6px">Sensitivity</label>
            <select id="editSensitivity" style="width:100%;height:40px;border-radius:8px;padding:6px 8px;border:1px solid var(--border);background:#fff">
              <option>External</option>
              <option>Internal</option>
              <option>External — Limited</option>
            </select>
          </div>

          <div>
            <label for="editStatus" style="display:block;font-weight:600;font-size:13px;margin-bottom:6px">Status</label>
            <select id="editStatus" style="width:100%;height:40px;border-radius:8px;padding:6px 8px;border:1px solid var(--border);background:#fff">
              <option>Approved</option>
              <option>Needs review</option>
            </select>
          </div>

          <div style="display:flex;gap:10px">
            <div style="flex:1">
              <label for="editStart" style="display:block;font-weight:600;font-size:13px;margin-bottom:6px">Start date</label>
              <input id="editStart" type="date" style="width:100%;height:40px;border-radius:8px;padding:6px 8px;border:1px solid var(--border);background:#fff" />
            </div>
            <div style="flex:1">
              <label for="editEnd" style="display:block;font-weight:600;font-size:13px;margin-bottom:6px">End date</label>
              <input id="editEnd" type="date" style="width:100%;height:40px;border-radius:8px;padding:6px 8px;border:1px solid var(--border);background:#fff" />
            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:6px">
            <button id="cancelEditMeta" type="button" class="btn">Cancel</button>
            <button id="saveEditMeta" type="button" class="btn primary">Save</button>
          </div>
        </form>
      </div>

      <style>
        #editMetaModal.modal {
          position: fixed;
          inset: 0;
          display:flex;
          align-items:center;
          justify-content:center;
          background: rgba(2,6,23,0.32);
          z-index: 1200;
          padding: 24px;
        }
        #editMetaModal .modal-panel {
          width: 720px;
          max-width: 96%;
          border-radius: 14px;
          background: var(--card);
          padding: 18px;
          box-shadow: var(--shadow);
          border: 1px solid var(--border);
        }
        @media (max-width:720px) {
          #editMetaModal .modal-panel { width: 100%; padding: 14px; border-radius: 12px }
        }
      </style>
    </div>

      /* ---------- small utilities ---------- */
      function loadDb() {
        try { const raw = localStorage.getItem(DB_KEY); return raw ? JSON.parse(raw) : { docs: {} }; }
        catch (e) { console.error('loadDb error', e); return { docs: {} }; }
      }
      function saveDb(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
      function makeId(filename) { return filename.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_\-\.]/g,'').toLowerCase(); }
      function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>"']/g,(m)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
      function parseFilenameToMeta(filename){
        const name = filename.replace(/\.pdf$/i,'');
        const parts = name.split(' - ');
        let title = parts[0] || name;
        let department = parts[1] || 'General';
        title = title.replace(/^2026\s*/i,'').trim();
        const lastValidated = 'Feb 27, 2026';
        return { title, department, lastValidated };
      }

      /* ---------- manifest loader (preferred) ---------- */
      async function loadManifest() {
        try {
          const resp = await fetch('doc_src/manifest.json', { cache: 'no-cache' });
          if (!resp.ok) { console.info('manifest not found (status)', resp.status); return null; }
          const json = await resp.json();
          if (Array.isArray(json)) return json;
          console.warn('manifest.json present but not an array; ignoring.');
          return null;
        } catch (err) {
          console.info('no manifest.json or failed to load it:', err && err.message);
          return null;
        }
      }

      /* ---------- probing helpers ---------- */
      async function tryHeadThenGet(url) {
        try { const h = await fetch(url, { method: 'HEAD' }); if (h && h.ok) return true; } catch (e) { /* HEAD may fail */ }
        try { const g = await fetch(url, { method: 'GET' }); if (g && (g.ok || g.type === 'opaque')) return true; } catch (e) {}
        return false;
      }
      function buildPathVariants(folder, filename) {
        const raw = `doc_src/${folder}/${filename}`;
        const wholeEncoded = encodeURI(raw);
        const filenameEncoded = 'doc_src/' + folder + '/' + encodeURIComponent(filename);
        const filenameEncodedSpaces = filenameEncoded.replace(/%20/g, ' ');
        return [raw, wholeEncoded, filenameEncodedSpaces, filenameEncoded].filter((v,i,a)=>a.indexOf(v)===i);
      }

      async function probeAcrossSources(filename) {
        const tried = [];
        for (const src of SOURCES) {
          const folderVariants = [src, src.toLowerCase(), src.charAt(0).toUpperCase()+src.slice(1).toLowerCase()].filter((v,i,a)=>a.indexOf(v)===i);
          for (const folder of folderVariants) {
            const paths = buildPathVariants(folder, filename);
            for (const p of paths) {
              tried.push({ folder, path: p });
              // eslint-disable-next-line no-await-in-loop
              const ok = await tryHeadThenGet(p);
              if (ok) {
                console.info('[probe] FOUND', filename, 'in', folder, '=>', p);
                return { found: true, path: p, source: folder, tried };
              }
            }
          }
        }
        console.warn('[probe] NOT FOUND:', filename, 'tried', tried.length, 'variants');
        return { found: false, tried };
      }

      /* ---------- DB entry creation (uses manifest if present, otherwise probing) ---------- */
      async function ensureDocEntry(filename, manifestMap) {
        const db = loadDb(); db.docs = db.docs || {};
        const id = makeId(filename);
        if (db.docs[id]) return db.docs[id];

        let entrySource = null;
        let entryPath = null;

        if (manifestMap && manifestMap[filename]) {
          entrySource = manifestMap[filename].source;
          entryPath = manifestMap[filename].path;
          console.info('[manifest] mapping', filename, '=>', entryPath);
        } else {
          const probe = await probeAcrossSources(filename);
          if (probe && probe.found) {
            entrySource = probe.source;
            entryPath = probe.path;
          } else {
            entrySource = 'Sharepoint';
            entryPath = `doc_src/${entrySource}/${encodeURIComponent(filename).replace(/%20/g,' ')}`;
            console.warn('[fallback] using default path for', filename, '=>', entryPath);
          }
        }

        const meta = parseFilenameToMeta(filename);
        const sensitivityChoices = ['External','Internal','External — Limited'];

        const newEntry = {
          id,
          filename,
          path: entryPath,
          source: entrySource,
          title: meta.title,
          department: meta.department,
          lastValidated: meta.lastValidated,
          status: Math.random() > 0.6 ? 'Approved' : 'Needs review',
          sensitivity: sensitivityChoices[Math.floor(Math.random()*sensitivityChoices.length)],
          dateRange: { start: null, end: null },
          votesUp: Math.floor(Math.random()*30)+1,
          votesDown: Math.floor(Math.random()*6),
          userVote: 0
        };

        db.docs[id] = newEntry;
        saveDb(db);
        return newEntry;
      }

      /* ---------- Rendering ---------- */
      function renderSensitivityPill(s) {
        if (!s) return '';
        const key = s.toLowerCase();
        if (key === 'external') return `<span class="pill blue"><span class="dot"></span> External</span>`;
        if (key === 'internal') return `<span class="pill gray"><span class="dot"></span> Internal</span>`;
        if (key.includes('limited')) return `<span class="pill purple"><span class="dot"></span> External — Limited</span>`;
        return `<span class="pill gray"><span class="dot"></span>${escapeHtml(s)}</span>`;
      }
      function renderStatusPill(s) {
        if (s === 'Approved') return `<span class="pill green"><span class="dot"></span> Approved</span>`;
        return `<span class="pill amber"><span class="dot"></span> Needs review</span>`;
      }
      function formatDateRange(range) {
        if (!range) return '';
        const { start, end } = range;
        if (!start && !end) return '';
        if (start && end) return `${start} → ${end}`;
        if (start) return `From ${start}`;
        return `Until ${end}`;
      }

      function cardHtml(doc) {
        return `
          <article class="result" data-id="${doc.id}" data-pdf="${doc.path}">
            <h3>${escapeHtml(doc.title)} <span class="dim">–</span> ${escapeHtml(doc.department)} <span class="dim">(Document)</span></h3>
            <div class="meta">
              <span><strong>${escapeHtml(doc.source)}</strong> <span class="dot">·</span> Last validated: ${escapeHtml(doc.lastValidated)}</span>
              <span class="dot">·</span>
              <span>Approved sensitivity:</span>
              ${renderSensitivityPill(doc.sensitivity)}
              <span class="dot">·</span>
              <span>Status:</span>
              ${renderStatusPill(doc.status)}
              ${doc.dateRange ? `<span class="dot">·</span><span>Range:</span><strong>${escapeHtml(formatDateRange(doc.dateRange))}</strong>` : ''}
            </div>

            <div class="result-footer">
              <div class="footer-left" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
                <button class="btn view-btn" type="button">View document</button>
                <button class="btn edit-meta" type="button">Edit metadata</button>
              </div>

              <div class="vote">
                <button class="counter counter--up vote-btn" data-id="${doc.id}" data-delta="1" aria-pressed="false">▲ <span class="vote-count">${doc.votesUp}</span></button>
                <button class="counter counter--down vote-btn" data-id="${doc.id}" data-delta="-1" aria-pressed="false">▼ <span class="vote-count">${doc.votesDown}</span></button>
              </div>
            </div>
          </article>
        `;
      }

      /* ---------- Modal viewer with fallback ---------- */
      function openPdfModalWithFallback(pdfUrl, title) {
        const modal = document.getElementById('pdfModal');
        const frame = document.getElementById('pdfFrame');
        const titleEl = document.getElementById('pdfTitle');
        const openNewTab = document.getElementById('openNewTab');

        // encode path segments but preserve readability if needed
        const safe = pdfUrl.split('/').map(seg => encodeURIComponent(decodeURIComponent(seg)).replace(/%20/g,' ')).join('/');

        frame.src = safe;
        titleEl.textContent = title || 'Document';
        openNewTab.href = safe;
        modal.classList.add('is-open'); modal.setAttribute('aria-hidden','false'); document.body.style.overflow = 'hidden';

        let loaded = false;
        const onload = () => { loaded = true; frame.removeEventListener('load', onload); };
        frame.addEventListener('load', onload);

        setTimeout(() => {
          if (loaded) return;
          // fallback: open in new tab
          window.open(safe, '_blank');
          frame.src = ''; modal.classList.remove('is-open'); modal.setAttribute('aria-hidden','true'); document.body.style.overflow = '';
          frame.removeEventListener('load', onload);
        }, 2200);
      }

      /* ---------- UI handlers (delegated) ---------- */
      function attachHandlers() {
        const results = document.querySelector('.results');

        // delegated click handling for buttons in cards
        results.addEventListener('click', (ev) => {
          const view = ev.target.closest('.view-btn');
          if (view) {
            const article = view.closest('.result'); if (!article) return;
            const pdf = article.getAttribute('data-pdf'); const title = article.querySelector('h3')?.textContent?.trim();
            openPdfModalWithFallback(pdf, title); return;
          }

          const sens = ev.target.closest('.edit-sensitivity');
          if (sens) {
            const article = sens.closest('.result'); if (!article) return;
            const id = article.getAttribute('data-id'); openEditModal(id, { focusField: 'sensitivity' }); return;
          }

          const metaBtn = ev.target.closest('.edit-meta');
          if (metaBtn) {
            const article = metaBtn.closest('.result'); if (!article) return;
            const id = article.getAttribute('data-id'); openEditModal(id); return;
          }
        });

        // votes (global handler)
        document.addEventListener('click', (ev) => {
          const up = ev.target.closest('.counter--up');
          const down = ev.target.closest('.counter--down');
          const btn = up || down;
          if (!btn) return;
          const id = btn.dataset.id; const delta = Number(btn.dataset.delta || 0);
          handleVote(id, delta);
        });

        // modal close
        const closePdfBtn = document.getElementById('closePdf');
        if (closePdfBtn) closePdfBtn.addEventListener('click', () => {
          const modal = document.getElementById('pdfModal'); const frame = document.getElementById('pdfFrame');
          frame.src = ''; modal.classList.remove('is-open'); modal.setAttribute('aria-hidden','true'); document.body.style.overflow = '';
        });
        document.getElementById('pdfModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) document.getElementById('closePdf').click(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && document.getElementById('pdfModal').classList.contains('is-open')) document.getElementById('closePdf').click(); });

        // small controls (export/import/reset/refresh/search)
        const exportBtn = document.getElementById('exportDb');
        if (exportBtn) exportBtn.addEventListener('click', exportDb);
        const importInput = document.getElementById('importDbFile');
        if (importInput) importInput.addEventListener('change', (e)=>{ const f = e.target.files[0]; if (f) importDbFile(f); });
        const resetBtn = document.getElementById('resetDb'); if (resetBtn) resetBtn.addEventListener('click', ()=>{ if(confirm('Reset local DB?')) { localStorage.removeItem(DB_KEY); init(true); }});
        const refreshBtn = document.getElementById('refreshDocs'); if (refreshBtn) refreshBtn.addEventListener('click', ()=> init(true));
        const searchBtn = document.getElementById('searchBtn'); if (searchBtn) searchBtn.addEventListener('click', applySearch);
        const searchBox = document.getElementById('searchBox'); if (searchBox) searchBox.addEventListener('keyup', (e)=>{ if (e.key==='Enter') applySearch(); });

        // modal edit handlers
        document.getElementById('saveEditMeta').addEventListener('click', () => {
          const id = document.getElementById('editDocId').value;
          const db = loadDb(); const entry = db.docs && db.docs[id];
          if (!entry) return alert('Document not found.');

          const sensitivity = document.getElementById('editSensitivity').value;
          const status = document.getElementById('editStatus').value;
          const start = document.getElementById('editStart').value || null;
          const end = document.getElementById('editEnd').value || null;

          entry.sensitivity = sensitivity;
          entry.status = status;
          entry.dateRange = { start, end };

          saveDb(db);
          refreshCardUI(id);
          closeEditModal();
        });

        document.getElementById('cancelEditMeta').addEventListener('click', closeEditModal);
        document.getElementById('closeEditMeta').addEventListener('click', closeEditModal);
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && document.getElementById('editMetaModal').style.display === 'flex') {
            closeEditModal();
          }
        });
      }

      /* ---------- votes and persistence ---------- */
      function handleVote(id, delta) {
        const db = loadDb(); const entry = db.docs && db.docs[id]; if (!entry) return;
        if (entry.userVote === delta) return; // idempotent
        if (entry.userVote === -delta) {
          if (delta === 1) entry.votesDown = Math.max(0, entry.votesDown-1);
          else entry.votesUp = Math.max(0, entry.votesUp-1);
        }
        if (delta === 1) entry.votesUp += 1;
        else if (delta === -1) entry.votesDown += 1;
        entry.userVote = delta;
        saveDb(db);
        refreshCardUI(id);
      }

      function refreshCardUI(id) {
        const db = loadDb(); const entry = db.docs && db.docs[id]; if (!entry) return;
        const article = document.querySelector(`.result[data-id="${id}"]`); if (!article) return;
        const upSpan = article.querySelector('.counter--up .vote-count'); const downSpan = article.querySelector('.counter--down .vote-count');
        if (upSpan) upSpan.textContent = entry.votesUp; if (downSpan) downSpan.textContent = entry.votesDown;
        const upBtn = article.querySelector('.counter--up'); const downBtn = article.querySelector('.counter--down');
        if (entry.userVote === 1) { upBtn.classList.add('is-active'); downBtn.classList.remove('is-active'); }
        else if (entry.userVote === -1) { downBtn.classList.add('is-active'); upBtn.classList.remove('is-active'); }
        else { upBtn.classList.remove('is-active'); downBtn.classList.remove('is-active'); }

        // update meta display (status/sensitivity/dateRange)
        const meta = article.querySelector('.meta');
        if (meta) {
          meta.innerHTML = `<span><strong>${escapeHtml(entry.source)}</strong> <span class="dot">·</span> Last validated: ${escapeHtml(entry.lastValidated)}</span>
            <span class="dot">·</span>
            <span>Approved sensitivity:</span>
            ${renderSensitivityPill(entry.sensitivity)}
            <span class="dot">·</span>
            <span>Status:</span>
            ${renderStatusPill(entry.status)}
            ${entry.dateRange ? `<span class="dot">·</span><span>Range:</span><strong>${escapeHtml(formatDateRange(entry.dateRange))}</strong>` : ''}`;
        }
      }

      /* ---------- edit modal (replacement for prompt flow) ---------- */
      function openEditModal(id, opts = {}) {
        const db = loadDb();
        const entry = db.docs && db.docs[id];
        if (!entry) return alert('Document not found in DB.');

        document.getElementById('editDocId').value = id;
        document.getElementById('editDocTitle').textContent = entry.title + ' — ' + entry.department;
        document.getElementById('editSensitivity').value = entry.sensitivity || 'Internal';
        document.getElementById('editStatus').value = entry.status || 'Needs review';
        document.getElementById('editStart').value = entry.dateRange?.start || '';
        document.getElementById('editEnd').value = entry.dateRange?.end || '';

        const modal = document.getElementById('editMetaModal');
        modal.style.display = 'flex';
        modal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';

        setTimeout(()=>{
          if (opts.focusField === 'sensitivity') document.getElementById('editSensitivity').focus();
          else document.getElementById('editSensitivity').focus();
        },50);
      }
      function closeEditModal() {
        const modal = document.getElementById('editMetaModal');
        modal.style.display = 'none';
        modal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }

      /* ---------- small helpers: sensitivity quick prompt (kept optional) ---------- */
      function promptAndSetSensitivity(id) {
        const db = loadDb(); const e = db.docs && db.docs[id]; if (!e) return;
        const choice = prompt('Set sensitivity (External / Internal / External — Limited):', e.sensitivity || 'Internal');
        if (!choice) return;
        e.sensitivity = choice.trim();
        saveDb(db); refreshCardUI(id);
      }

      /* ---------- export / import helpers ---------- */
      function exportDb() {
        const db = loadDb();
        const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob); const a = document.createElement('a');
        a.href = url; a.download = 'ask_kathleen_db.json'; a.click(); URL.revokeObjectURL(url);
      }
      function importDbFile(file) {
        const r = new FileReader();
        r.onload = (ev) => {
          try {
            const parsed = JSON.parse(ev.target.result);
            if (parsed && parsed.docs) {
              localStorage.setItem(DB_KEY, JSON.stringify(parsed));
              alert('DB imported — refreshing view.');
              init(true);
            } else alert('Invalid DB file.');
          } catch (err) { alert('Failed to parse JSON: ' + err.message); }
        };
        r.readAsText(file);
      }

      /* ---------- search + filters ---------- */
      function applySearch() {
        const q = document.getElementById('searchBox')?.value?.trim().toLowerCase() || '';
        const loc = document.getElementById('filter-location')?.value || '';
        const start = document.getElementById('filter-start-date')?.value || '';
        const end = document.getElementById('filter-end-date')?.value || '';
        const status = document.getElementById('filter-status')?.value || '';
        const sensitivity = document.getElementById('filter-sensitivity')?.value || '';

        document.querySelectorAll('.results .result').forEach(r => {
          const id = r.getAttribute('data-id');
          const db = loadDb();
          const entry = db.docs && db.docs[id];
          if (!entry) { r.style.display = 'none'; return; }

          let visible = true;
          // query text matches title/department/filename
          if (q) {
            const txt = (entry.title + ' ' + entry.department + ' ' + (entry.filename||'')).toLowerCase();
            if (!txt.includes(q)) visible = false;
          }
          // location filter
          if (visible && loc) {
            if ((entry.source || '').toLowerCase() !== loc.toLowerCase()) visible = false;
          }
          // status filter
          if (visible && status) {
            if ((entry.status || '').toLowerCase() !== status.toLowerCase()) visible = false;
          }
          // sensitivity filter
          if (visible && sensitivity) {
            if ((entry.sensitivity || '').toLowerCase() !== sensitivity.toLowerCase()) visible = false;
          }
          // date range filtering (entry.dateRange {start,end} are yyyy-mm-dd or null)
          if (visible && (start || end)) {
            const es = entry.dateRange?.start || null;
            const ee = entry.dateRange?.end || null;
            // if entry has no dates, exclude when a filter range is provided
            if (!es && !ee) visible = false;
            else {
              if (start && es && es < start) visible = false;
              if (end && ee && ee > end) visible = false;
            }
          }

          r.style.display = visible ? '' : 'none';
        });
      }

      /* ---------- main init flow ---------- */
      async function init(forceRefresh = false) {
        const resultsEl = document.querySelector('.results');
        if (!resultsEl) return console.warn('No .results element found in DOM');
        resultsEl.innerHTML = '<div style="text-align:center;color:var(--muted)">Discovering documents…</div>';

        const db = loadDb();
        db.docs = db.docs || {};

        // load manifest if present
        const manifestArr = await loadManifest();
        let manifestMap = null;
        if (manifestArr) {
          manifestMap = {};
          for (const item of manifestArr) {
            if (item && item.filename) manifestMap[item.filename] = { source: item.source || 'Sharepoint', path: item.path };
          }
        }

        // build DB entries if missing or forceRefresh
        if (!forceRefresh && Object.keys(db.docs||{}).length >= ALL_FILES.length) {
          console.info('Using existing DB (no force refresh).');
        } else {
          for (const fn of ALL_FILES) {
            // eslint-disable-next-line no-await-in-loop
            await ensureDocEntry(fn, manifestMap);
          }
        }

        // pick 10 random entries
        const currentDb = loadDb();
        const docsArr = Object.values(currentDb.docs || {});
        // shuffle
        for (let i = docsArr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [docsArr[i], docsArr[j]] = [docsArr[j], docsArr[i]];
        }
        const chosen = docsArr.slice(0, Math.min(10, docsArr.length));
        resultsEl.innerHTML = chosen.map(cardHtml).join('');
        attachHandlers();
        // refresh UI states from DB (votes, pills)
        chosen.forEach(d => refreshCardUI(d.id));

        console.table(Object.values(currentDb.docs || {}).map(d => ({ id: d.id, filename: d.filename, source: d.source, path: d.path, status: d.status, sensitivity: d.sensitivity, start:d.dateRange?.start||'', end:d.dateRange?.end||'' })));
      }

      /* ---------- kick off ---------- */
      document.addEventListener('DOMContentLoaded', () => {
        attachHandlers();
        init(false);
      });
    </script>
